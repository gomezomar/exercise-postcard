<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Postcard</title>
		<style>
			body {
				margin: 0;
				padding: 20px;
				background-color: #f0f0f0;
				font-family: Arial, sans-serif;
			}
			.postcard {
				width: 600px;
				height: 400px;
				background-color: white;
				margin: 0 auto;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				display: flex;
				flex-direction: column;
			}
			.postcard-header {
				background-color: #e74c3c;
				color: white;
				padding: 20px;
				text-align: center;
				font-size: 28px;
				font-weight: bold;
			}
			.postcard-content {
				flex: 1;
				padding: 20px;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
			}
			.postcard-message {
				font-size: 16px;
				line-height: 1.6;
				color: #333;
			}
			.postcard-footer {
				display: flex;
				justify-content: space-between;
				padding-top: 20px;
				border-top: 1px solid #ddd;
			}
			.postcard-from,
			.postcard-to {
				font-size: 12px;
				color: #666;
			}
		</style>
	</head>
	<body>
		<div class="postcard">Hello</div>
	</body>
</html>
